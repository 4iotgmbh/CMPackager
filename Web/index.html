<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMPackager</title>
<style>
/* ── Reset & base ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

/* ── Design tokens ───────────────────────────────────────────────────────── */
:root {
  --bg:          #0f1117;
  --surface:     #1a1d27;
  --surface-2:   #252836;
  --surface-3:   #2e3247;
  --border:      #2d3147;
  --text:        #e2e8f0;
  --muted:       #8892a4;
  --accent:      #6366f1;
  --accent-h:    #818cf8;
  --accent-dim:  rgba(99,102,241,.15);
  --success:     #22c55e;
  --danger:      #ef4444;
  --warning:     #f59e0b;
  --info:        #38bdf8;
  --term-bg:     #080b10;
  --term-text:   #d4d4d4;
  --font-ui:     -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono:   'Consolas', 'Cascadia Code', 'Courier New', monospace;
  --r-sm: 4px;  --r-md: 8px;  --r-lg: 12px;
  --shadow: 0 4px 16px rgba(0,0,0,.5);
}

/* ── App shell ───────────────────────────────────────────────────────────── */
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────────────────────────────────── */
.header {
  flex: 0 0 56px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.2px;
  white-space: nowrap;
}
.logo span { color: var(--accent); }
.logo-img { height: 28px; width: auto; display: block; }

.tab-bar {
  display: flex;
  gap: 2px;
  flex: 1;
  overflow: hidden;
}

.tab-btn {
  padding: 5px 14px;
  border: none;
  border-radius: var(--r-sm);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  white-space: nowrap;
  transition: background .12s, color .12s;
}
.tab-btn:hover  { background: var(--surface-2); color: var(--text); }
.tab-btn.active { background: var(--accent-dim); color: var(--accent-h); font-weight: 500; }

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 12px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--muted);
  transition: border-color .2s, color .2s;
}
.status-pill.running { border-color: var(--success); color: var(--success); }

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
}
.status-pill.running .status-dot {
  background: var(--success);
  animation: pulse 1.4s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,.5); }
  50%       { opacity: .7; box-shadow: 0 0 0 4px rgba(34,197,94,0); }
}

/* ── Main content ────────────────────────────────────────────────────────── */
.main { flex: 1; overflow: hidden; position: relative; }

.tab-content {
  display: none;
  height: 100%;
  overflow-y: auto;
  padding: 20px;
}
.tab-content.active { display: flex; flex-direction: column; gap: 16px; }

/* ── Warning banner ──────────────────────────────────────────────────────── */
.banner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: var(--r-md);
  font-size: 13px;
  border: 1px solid;
}
.banner-warning {
  background: rgba(245,158,11,.08);
  border-color: rgba(245,158,11,.3);
  color: var(--warning);
}
.banner-info {
  background: rgba(56,189,248,.08);
  border-color: rgba(56,189,248,.3);
  color: var(--info);
}
.banner-hide { display: none !important; }

/* ── Section headers ─────────────────────────────────────────────────────── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
}
.section-count {
  font-size: 11px;
  background: var(--surface-2);
  color: var(--muted);
  padding: 2px 7px;
  border-radius: 999px;
  border: 1px solid var(--border);
}

/* ── Recipes grid ────────────────────────────────────────────────────────── */
.recipes-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  align-items: start;
}
@media (max-width: 720px) { .recipes-grid { grid-template-columns: 1fr; } }

.recipe-list { display: flex; flex-direction: column; gap: 6px; }

.recipe-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  transition: border-color .15s, background .15s;
}
.recipe-card:hover { border-color: var(--accent); background: var(--surface-2); }

.recipe-info { min-width: 0; }
.recipe-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.recipe-meta { font-size: 11px; color: var(--muted); font-family: var(--font-mono); margin-top: 1px; }

.recipe-actions { display: flex; gap: 5px; flex-shrink: 0; }

.recipe-empty {
  padding: 32px 16px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  border: 1px dashed var(--border);
  border-radius: var(--r-md);
}

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border: 1px solid transparent;
  border-radius: var(--r-sm);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  font-weight: 500;
  line-height: 1;
  white-space: nowrap;
  transition: background .12s, border-color .12s, opacity .12s;
  text-decoration: none;
}
.btn:disabled, .btn.disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }
.btn-sm { padding: 4px 9px; font-size: 12px; }

.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-h); border-color: var(--accent-h); }

.btn-danger  { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-danger:hover { opacity: .85; }

.btn-ghost {
  background: transparent;
  color: var(--text);
  border-color: var(--border);
}
.btn-ghost:hover { background: var(--surface-2); border-color: var(--surface-3); }

.btn-success { background: rgba(34,197,94,.12); color: var(--success); border-color: rgba(34,197,94,.3); }
.btn-success:hover { background: rgba(34,197,94,.2); }

/* ── Filter input ────────────────────────────────────────────────────────── */
.filter-input {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  padding: 4px 8px;
  width: 200px;
  outline: none;
  transition: border-color .12s;
}
.filter-input:focus { border-color: var(--accent); }
.filter-input::placeholder { color: var(--muted); }

/* ── Output / Terminal tab ───────────────────────────────────────────────── */
.output-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.output-toolbar .spacer { flex: 1; }

.terminal-wrap {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: var(--term-bg);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.terminal-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  color: var(--muted);
}
.term-dot { width: 10px; height: 10px; border-radius: 50%; }
.term-dot-r { background: #ff5f57; }
.term-dot-y { background: #ffbd2e; }
.term-dot-g { background: #28c840; }
.terminal {
  flex: 1;
  overflow-y: auto;
  padding: 10px 14px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.65;
  color: var(--term-text);
}
.output-line { white-space: pre-wrap; word-break: break-all; }
.output-line.err { color: #f87171; }
.output-line.warn { color: #fbbf24; }
.output-line.ok { color: #4ade80; }
.output-line.dim { color: #6b7280; }

.log-section {
  border-top: 1px solid var(--border);
  padding: 10px 14px;
  max-height: 280px;
  overflow-y: auto;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.65;
  color: #9ca3af;
}
.log-line { white-space: pre-wrap; word-break: break-all; font-family: var(--font-mono); font-size: 12px; }
.log-ts   { color: #4b5563; flex-shrink: 0; }
.log-msg  { color: #9ca3af; }
.log-msg.err  { color: #f87171; }
.log-msg.warn { color: #fbbf24; }
.log-msg.ok   { color: #4ade80; }
.log-msg.dim  { color: #6b7280; }
.log-line.err  { color: #f87171; }
.log-line.warn { color: #fbbf24; }
.log-line.ok   { color: #4ade80; }
.log-line.dim  { color: #6b7280; }

/* ── Tests tab ───────────────────────────────────────────────────────────── */
.table-wrap {
  overflow: auto;
  max-height: calc(100vh - 165px);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  background: var(--surface);
}
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.data-table thead { position: sticky; top: 0; z-index: 1; }
.data-table th {
  text-align: left;
  padding: 10px 14px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  color: var(--muted);
  font-weight: 500;
  font-size: 12px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.data-table th:hover { color: var(--text); }
.data-table th .sort-ic { margin-left: 4px; opacity: .4; }
.data-table th.sorted { color: var(--accent-h); }
.data-table th.sorted .sort-ic { opacity: 1; }
.data-table td {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.data-table tbody tr:last-child td { border-bottom: none; }
.data-table tbody tr:hover td { background: var(--surface-2); }
.data-table .mono { font-family: var(--font-mono); font-size: 11px; }
.data-table .center { text-align: center; }

/* ── Badges ──────────────────────────────────────────────────────────────── */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .2px;
  white-space: nowrap;
}
.badge-pass    { background: rgba(34,197,94,.12);  color: #4ade80; }
.badge-fail    { background: rgba(239,68,68,.12);  color: #f87171; }
.badge-timeout { background: rgba(245,158,11,.12); color: #fbbf24; }
.badge-skipped { background: rgba(56,189,248,.12); color: #7dd3fc; }
.badge-error   { background: rgba(239,68,68,.08);  color: #fca5a5; }
.badge-unknown { background: rgba(139,148,158,.12); color: var(--muted); }

/* ── SCCM tab ────────────────────────────────────────────────────────────── */
.sccm-app {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  overflow: hidden;
}
.sccm-app-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
.sccm-app-header:hover { background: var(--surface-3); }
.sccm-app-name { font-weight: 500; font-size: 13px; }
.sccm-app-meta { font-size: 11px; color: var(--muted); font-family: var(--font-mono); margin-top: 2px; }
.sccm-deploy-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.sccm-deploy-table td { padding: 7px 16px; border-bottom: 1px solid var(--border); }
.sccm-deploy-table tr:last-child td { border-bottom: none; }
.sccm-deploy-table .col-coll { color: var(--text); font-weight: 500; }
.sccm-deploy-table .col-type { color: var(--muted); }
.sccm-deploy-table .col-num { font-family: var(--font-mono); color: var(--muted); font-size: 11px; text-align: right; }

/* ── Spinner ─────────────────────────────────────────────────────────────── */
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ───────────────────────────────────────────────────────────────── */
#toast-container {
  position: fixed;
  bottom: 24px; right: 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  z-index: 100;
  pointer-events: none;
}
.toast {
  padding: 10px 16px;
  border-radius: var(--r-md);
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-left-width: 3px;
  box-shadow: var(--shadow);
  font-size: 13px;
  max-width: 340px;
  pointer-events: auto;
  animation: toast-in .18s ease;
}
.toast-info    { border-left-color: var(--accent); }
.toast-success { border-left-color: var(--success); color: #4ade80; }
.toast-error   { border-left-color: var(--danger);  color: #f87171; }
.toast-warning { border-left-color: var(--warning); color: #fbbf24; }
@keyframes toast-in { from { transform: translateX(16px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── Empty state ─────────────────────────────────────────────────────────── */
.empty-state {
  padding: 48px 24px;
  text-align: center;
  color: var(--muted);
}
.empty-state p { margin-top: 8px; font-size: 13px; }

/* ── Utility ─────────────────────────────────────────────────────────────── */
.flex-row { display: flex; align-items: center; gap: 8px; }
.ml-auto  { margin-left: auto; }
.text-muted { color: var(--muted); }
.text-sm { font-size: 12px; }
.sccm-grid { display: flex; flex-direction: column; gap: 8px; }

/* ── Schedule controls ───────────────────────────────────────────────────── */
.sched-wrap { position: relative; display: inline-flex; }

.sched-icon {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 7px;
  background: var(--accent-dim); color: var(--accent-h); border-color: rgba(99,102,241,.35);
}
.sched-icon:hover { background: rgba(99,102,241,.25); }
.sched-icon-weekly  { color: #7dd3fc; background: rgba(56,189,248,.12); border-color: rgba(56,189,248,.3); }
.sched-icon-weekly:hover  { background: rgba(56,189,248,.2); }
.sched-icon-monthly { color: #c4b5fd; background: rgba(167,139,250,.12); border-color: rgba(167,139,250,.3); }
.sched-icon-monthly:hover { background: rgba(167,139,250,.2); }

.sched-btn-add { color: var(--muted); }

.sched-popover {
  position: absolute; top: calc(100% + 4px); right: 0; z-index: 50;
  background: var(--surface-2); border: 1px solid var(--border);
  border-radius: var(--r-md); box-shadow: var(--shadow);
  min-width: 152px; overflow: hidden;
  display: flex; flex-direction: column;
}
.sched-popover-opt {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border: none; background: transparent;
  color: var(--text); font-size: 13px; font-family: inherit;
  cursor: pointer; white-space: nowrap; transition: background .1s;
}
.sched-popover-opt:hover { background: var(--surface-3); }
.sched-popover-opt.active { color: var(--accent-h); font-weight: 500; }
.sched-popover-opt.active::after { content: '✓'; margin-left: auto; font-size: 11px; opacity: .8; }
.sched-popover-sep { height: 1px; background: var(--border); margin: 2px 0; }
.sched-popover-remove { color: var(--danger); font-size: 12px; padding: 6px 12px; }
.sched-popover-remove:hover { background: rgba(239,68,68,.08); }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="logo">
    <img src="/logo.png" alt="4GT Logo" class="logo-img">
    CM<span>Packager</span>
  </div>
  <nav class="tab-bar" role="tablist">
    <button class="tab-btn active" data-tab="recipes" role="tab">Recipes</button>
    <button class="tab-btn" data-tab="output" role="tab">Output</button>
    <button class="tab-btn" data-tab="tests" role="tab">Test Results</button>
    <button class="tab-btn" data-tab="sccm" role="tab">SCCM Status</button>
  </nav>
  <div class="header-right">
    <div class="status-pill" id="status-pill">
      <div class="status-dot"></div>
      <span id="status-label">Idle</span>
    </div>
    <button class="btn btn-primary btn-sm" id="btn-run-all" onclick="runAll()">Run All</button>
    <button class="btn btn-danger btn-sm" id="btn-stop" style="display:none" onclick="stopRun()">Stop</button>
  </div>
</header>

<!-- Main -->
<main class="main">

  <!-- ── Recipes tab ───────────────────────────────────────────────────── -->
  <section class="tab-content active" data-tab="recipes" id="tab-recipes">
    <div id="prefs-banner" class="banner banner-warning banner-hide">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span>CMPackager.prefs not found — copy <code>CMPackager.prefs.template</code> to <code>CMPackager.prefs</code> and configure it before running.</span>
    </div>

    <div class="recipes-grid">
      <!-- Enabled column -->
      <div>
        <div class="section-header">
          <span class="section-title">Enabled</span>
          <div class="flex-row">
            <input class="filter-input" id="filter-enabled" type="text" placeholder="Filter…" style="width:140px">
            <span class="section-count" id="count-enabled">0</span>
          </div>
        </div>
        <div class="recipe-list" id="list-enabled">
          <div class="recipe-empty">Loading…</div>
        </div>
      </div>

      <!-- Disabled column -->
      <div>
        <div class="section-header">
          <span class="section-title">Disabled</span>
          <div class="flex-row">
            <input class="filter-input" id="filter-disabled" type="text" placeholder="Filter…" style="width:140px">
            <span class="section-count" id="count-disabled">0</span>
          </div>
        </div>
        <div class="recipe-list" id="list-disabled">
          <div class="recipe-empty">Loading…</div>
        </div>
      </div>
    </div>
  </section>

  <!-- ── Output tab ────────────────────────────────────────────────────── -->
  <section class="tab-content" data-tab="output" id="tab-output">
    <div class="output-toolbar">
      <div class="flex-row">
        <span class="text-muted text-sm" id="output-meta">No run started.</span>
      </div>
      <div class="spacer"></div>
      <button class="btn btn-ghost btn-sm" onclick="clearOutput()">Clear</button>
      <label class="flex-row text-sm text-muted" style="cursor:pointer">
        <input type="checkbox" id="chk-autoscroll" checked style="accent-color:var(--accent)"> Auto-scroll
      </label>
      <label class="flex-row text-sm text-muted" style="cursor:pointer">
        <input type="checkbox" id="chk-showlog" onchange="toggleLogPane()"> Show log
      </label>
    </div>

    <div class="terminal-wrap">
      <div class="terminal-bar">
        <div class="term-dot term-dot-r"></div>
        <div class="term-dot term-dot-y"></div>
        <div class="term-dot term-dot-g"></div>
        <span style="margin-left:4px">CMPackager Output</span>
        <span class="ml-auto" id="line-count" style="font-family:var(--font-mono)">0 lines</span>
      </div>
      <div class="terminal" id="terminal"></div>
      <div class="log-section" id="log-section" style="display:none">
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600;letter-spacing:.4px;">LOG FILE</div>
        <div id="log-lines"></div>
      </div>
    </div>
  </section>

  <!-- ── Test Results tab ──────────────────────────────────────────────── -->
  <section class="tab-content" data-tab="tests" id="tab-tests">
    <div class="flex-row">
      <span class="text-muted text-sm" id="tests-meta">No test results found.</span>
      <div class="spacer"></div>
      <input class="filter-input" id="tests-filter" type="text" placeholder="Filter…">
      <button class="btn btn-ghost btn-sm" onclick="loadTests()">Refresh</button>
    </div>

    <div id="tests-body">
      <div class="empty-state">
